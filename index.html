，確認符合後再簽署完工", "退回工作單，不予執行", "不予理會，直接簽署完工"], "page": 1, "correct": [0], "confidence": "高", "note": "RII 完工檢查若發現與工作單/技術資料不符，應重新檢查或要求改正，確認符合後才可簽署。", "category": "RII", "source": "TAMECO RSQCM §8.2D; §13.2"}, {"id": 7, "question": "下列哪些項目是執行RII完工檢驗時應該涵蓋的\n內容？(複選)", "options": ["施工技術文件與施工人員資格", "施工方法與結果", "使用之工具裝備與航材"], "page": 1, "correct": [0, 1, 2], "confidence": "高", "note": "RII 完工檢驗應涵蓋技術文件、人員資格、施工方法與結果，以及工具、裝備、航材等維修符合性項目。", "category": "RII", "source": "TAMECO RSQCM §8.2D; TPM §7.8G"}, {"id": 8, "question": "RII完工檢驗授權來自於", "options": ["LAE憑證照即可取得授權", "維修廠完成訓練後給予授權", "由顧客審核資格後給予授權"], "page": 1, "correct": [2], "confidence": "高", "note": "RSQCM 規定 RII 檢驗由受顧客訓練、認證、資格審查並授權之 TAMECO LAE 執行；詳細 RII 項目由 Customer 提供。", "category": "RII", "source": "TAMECO RSQCM §8.2D"}, {"id": 9, "question": "臨時支援之停機線顧客機維修，如何簽署RII工\n作？", "options": ["須依程序完成相關訓練，再向顧客申請授權", "提供人員工作經歷與受訓紀錄，請顧客審核後給\n予一次性RII授權", "將工作單或LOG傳真給顧客工程師簽署RII"], "page": 1, "correct": [1], "confidence": "高", "note": "臨時支援顧客機 RII 工作時，應提供工作經歷與訓練紀錄等資料，由顧客審核後給予一次性或指定授權。", "category": "RII", "source": "TAMECO RSQCM §8.2C-D; TPM §2.4C"}, {"id": 10, "question": "Non-routine缺點改正，如何判定是否是RII項目？", "options": ["參考該顧客(航空器使用人)之General Maintenance\nManual (GMM)", "依據工作單上之RII標示", "參考同型機之RII項目清單"], "page": 1, "correct": [0], "confidence": "高", "note": "Non-routine 是否屬 RII，應依該顧客/航空器使用人之 GMM、RII policy/list 或 customer manual 判定。", "category": "RII", "source": "TAMECO RSQCM §8.2D; TPM §7.8G", "options_zh": [null, null, null], "note_en": "For non-routine defect rectification, determine whether it is an RII item by the customer/operator GMM, RII policy/list, or customer manual."}, {"id": 11, "question": "Which one of the following items is not mandatory\nto be reported to the JCAB?", "options": ["Fires caused by a system or equipment failure,\nmalfunction or defect.", "An engine exhaust system failure, malfunction or\ndefect which causes damage to the engine, adjacent\naircraft structure, equipment or components.", "Malfunction or defect on component which does not\nseriously affect on the safety of an aircraft."], "page": 1, "correct": [2], "confidence": "高", "note": "未嚴重影響航空器安全之部件故障/缺陷通常不屬強制通報項目。", "category": "SDR/飛安通報", "source": "TAMECO RSQCM §16.5 / §16.7; CAR 06-01A Art. 27; CAR 06-02A Art. 32; 08-01A as applicable", "question_zh": "下列哪一項不是必須向 JCAB 強制通報的項目？", "options_zh": ["因系統或設備失效、故障或缺陷所造成的火災。", "發動機排氣系統失效、故障或缺陷，並造成發動機、鄰近航空器結構、設備或部件損傷。", "未嚴重影響航空器安全之部件故障或缺陷。"], "note_en": "A component malfunction or defect that does not seriously affect aircraft safety is normally not a mandatory report item."}, {"id": 12, "question": "民航法07-02A第一百四十七條規範應由何者訂定\n必須檢驗項目(RII)？", "options": ["航空器擁有者 (Aircraft Owner)", "航空器使用人 (Aircraft Operator)", "飛機維修廠 (Aircraft Repair Station)"], "page": 1, "correct": [1], "confidence": "高", "note": "同第 1 題：RII 項目由航空器使用人/顧客依其 GMM 或 customer manual 指定。", "category": "RII", "source": "TAMECO RSQCM §8.2D; TPM §7.8G; Customer GMM"}, {"id": 13, "question": "下列哪一航空器使用人手冊內不須編定RII檢驗\n相關之程序？", "options": ["航空器維護計畫", "維護訓練計畫", "SMS手冊"], "page": 1, "correct": [2], "confidence": "高", "note": "同第 2 題：SMS 手冊不是用來編定 RII 檢驗程序的主要手冊。", "category": "RII", "source": "TPM §7.8G RII Training"}, {"id": 14, "question": "RII項目之檢驗程序規範不適用於下列哪一維修\n作業？", "options": ["停機線故障排除", "C CHECK結構缺改", "發動機翻修"], "page": 1, "correct": [2], "confidence": "中", "note": "同第 4 題：RII 主要與顧客航空器維修工作單/維護作業之 Required Inspection Items 有關，發動機翻修通常另依維修廠/部件修護程序管制。", "category": "RII", "source": "TAMECO RSQCM §8.2D; customer manual as applicable"}, {"id": 15, "question": "RII工作項目簽署需要", "options": ["一名AME簽署工作執行，另一名LAE簽署完工檢\n驗", "一名LAE簽署工作執行，另一名LAE簽署完工檢\n驗", "一名AME簽署工作執行，另一名AME簽署完工\n檢驗"], "page": 1, "correct": [1], "confidence": "高", "note": "重點為工作執行與 RII 完工檢驗不可由同一人完成；此題選項中以 LAE 執行、另一名 LAE/具 RII 授權人員檢驗最符合。", "category": "RII", "source": "TAMECO RSQCM §8.2D; TPM §7.8G"}, {"id": 16, "question": "當LAE執行RII完工檢查發現有與工作單不相符\n狀況時，應如何處置？", "options": ["重新執行修護檢驗，確認符合後再簽署完工", "退回工作單，不予執行", "不予理會，直接簽署完工"], "page": 1, "correct": [0], "confidence": "高", "note": "同第 6 題：不符合時應改正/重新檢查並確認符合後才可簽署完工。", "category": "RII", "source": "TAMECO RSQCM §8.2D; §13.2"}, {"id": 17, "question": "RII完工檢驗授權來自於", "options": ["LAE憑證照即可取得授權", "維修廠完成訓練後給予授權", "由顧客審核資格後給予授權"], "page": 1, "correct": [2], "confidence": "高", "note": "同第 8 題：RII 授權來自顧客/航空器使用人對人員資格與訓練的審核授權。", "category": "RII", "source": "TAMECO RSQCM §8.2D"}, {"id": 18, "question": "06-02A第19條規定，航空器有下何者為不合於適\n航安全條件：", "options": ["其所有人或使用人不依規定妥善維修，致航空器\n不能安全飛航者。", "其所有人或使用人逾期執行或未執行民航局或原\n設計國民航主管機關通告之適航指令", "以上皆是"], "page": 1, "correct": [2], "confidence": "高", "note": "不依規定妥善維修與逾期/未執行適航指令，皆屬不合適航安全條件。", "category": "CAA/CAR", "source": "CAR 06-01A / 06-02A and applicable CAA rules"}, {"id": 19, "question": "About SDR items, which manual/section shall be\nreferenced?", "options": ["CAL GMM 8.6", "TAMECO RSQCM 16.6", "TAMECO RSQCM 16.5"], "page": 2, "correct": [2], "confidence": "高", "note": "SDR / Malfunction or Defect Reporting 對應 TAMECO RSQCM §16.5；§16.6 是 Suspected Unapproved Parts，不是 SDR item 主章節。", "category": "SDR/飛安通報", "source": "TAMECO RSQCM §16.5 Malfunction or Defect Reporting", "question_zh": "關於 SDR 項目，應參考哪一本手冊／哪一章節？", "options_zh": [null, null, null], "note_en": "SDR / malfunction or defect reporting corresponds to TAMECO RSQCM §16.5. §16.6 is for suspected unapproved parts, not the SDR section."}, {"id": 20, "question": "According to 01-01A, article 110, The responsible\nperson of a manufacturer or repair station, their\nemployee or other hired person who undertakes the\nmanufacture or maintenance with unapproved\naviation products, appliances and parts, shall be", "options": ["A fine from NT$60,000 to NT$300,000. In serious\ncases, the penalty shall be revocation of the\ncertificate", "A fine from NT$600,000 to NT$3,000,000.", "Imprisonment not more than 3 years, detention, or in\nlieu of or addition to, a fine of up to NT$1,000,000."], "page": 2, "correct": [2], "confidence": "高", "note": "01-01A 民用航空法第 110 條：以未經檢驗合格之航空器各項裝備及零組件從事製造或維修者，處三年以下有期徒刑、拘役或科或併科一百萬元以下罰金。", "category": "01-01A 民用航空法", "source": "01-01A 民用航空法", "question_zh": "依 01-01A 第 110 條，製造廠或維修廠負責人、受雇人或其他從業人員，以未經核准／未經檢驗合格之航空產品、裝備及零組件從事製造或維修者，應受何種處罰？", "options_zh": ["處新臺幣 6 萬元以上 30 萬元以下罰鍰；情節重大者，廢止檢定證書。", "處新臺幣 60 萬元以上 300 萬元以下罰鍰。", "處 3 年以下有期徒刑、拘役，或科或併科新臺幣 100 萬元以下罰金。"], "note_en": "Civil Aviation Act 01-01A Article 110 provides imprisonment of up to 3 years, detention, or a fine of up to NT$1,000,000 for using unapproved equipment or parts for manufacture or maintenance."}, {"id": 21, "question": "According to 06-02A, article 27, the operator shall\nestablish what system from 2009.Jan.1, and report to\nCAA for approval?", "options": ["self report system", "Safety Management System", "volunteer report system"], "page": 2, "correct": [1], "confidence": "高", "note": "06-02A 第 27 條規定維修廠應建立 Safety Management System (SMS)，並報請民航局備查/核准後實施。", "category": "CAA/CAR", "source": "CAR 06-02A Art. 27; 06-02A Appendix 3-1", "question_zh": "依 06-02A 第 27 條，自 2009 年 1 月 1 日起，維修廠應建立何種系統並報請 CAA 核准？", "options_zh": ["自我通報系統", "安全管理系統", "自願通報系統"], "note_en": "CAR 06-02A requires a repair station to establish a Safety Management System (SMS) and submit it to CAA for approval/acceptance as applicable."}, {"id": 22, "question": "According to CAR 06-01A, article 21, to perform\nmajor repair/modification shall be in accordance\nwith what kind of data?", "options": ["CAA approved data", "CAA acceptable data", "all of the above"], "page": 2, "correct": [0], "confidence": "高", "note": "06-01A 第 21 條規定航空器大修理、大改裝應依民航局核准之文件執行；也就是 CAA approved data。", "category": "CAA/CAR", "source": "CAR 06-01A Art. 21", "question_zh": "依 CAR 06-01A 第 21 條，執行大修理／大改裝應依據何種資料？", "options_zh": ["CAA 核准資料", "CAA 可接受資料", "以上皆是"], "note_en": "Major repair or major modification must be performed in accordance with CAA approved data."}, {"id": 23, "question": "According to CAR 06-01A, article 27, operator\nwithin how many hours shall report to\nOEM/authority any other failure, malfunction, or\ndefect in an aircraft that occurs or is detected at any\ntime if, in its opinion, that failure, malfunction, or", "options": ["72", "48", "24"], "page": 2, "correct": [0], "confidence": "高", "note": "06-01A 第 27 條：可能或已造成航空器無法符合持續適航標準之系統缺失、失效、缺陷，應於發現後 72 小時內通報民航局並通報原製造廠。", "category": "CAA/CAR", "source": "CAR 06-01A Art. 27", "question_zh": "依 CAR 06-01A 第 27 條，當航空器發生或發現任何其他失效、故障或缺陷，且使用人認為可能或已造成航空器無法符合持續適航標準時，應於幾小時內通報 OEM／主管機關？", "options_zh": [null, null, null], "note_en": "CAR 06-01A Article 27 requires reporting to CAA and the OEM within 72 hours after discovery."}, {"id": 24, "question": "According to CAR 06-01A, article 6, authorized\ncertify staff shall fill out what kind of form after\nmajor repair/modification completed?", "options": ["CAA Form One", "serviceable tag", "CAA Form 337"], "page": 2, "correct": [2], "confidence": "高", "note": "06-01A 第 6 條規定完成大修理或大改裝後，授權簽證人員應填具航空器大修理、大改裝妥適報告表，即 CAA Form 337。", "category": "FAA/FAR", "source": "CAR 06-01A Art. 6; Appendix 3", "question_zh": "依 CAR 06-01A 第 6 條，大修理／大改裝完成後，授權簽證人員應填具何種表格？", "options_zh": [null, "適航／可用掛籤", null], "note_en": "After completion of a major repair or major modification, the authorized certifying staff shall complete CAA Form 337."}, {"id": 25, "question": "After aircraft return service, the operator/repair\nstation shall sign off CAA Form 337 and report to\nCAA through FSMIS for major repair/modification", "options": ["24 hours", "48 hours", "72 hours"], "page": 2, "correct": [1], "confidence": "高", "note": "06-01A 附件四規定，航空器/產品恢復可用後 48 小時內，應將已簽署之妥適報告表送交民航局。", "category": "FAA/FAR", "source": "CAR 06-01A Appendix 4", "question_zh": "航空器恢復可用後，航空器使用人／維修廠應簽署 CAA Form 337，並於大修理／大改裝後幾小時內透過 FSMIS 向 CAA 提報？", "options_zh": ["24 小時", "48 小時", "72 小時"], "note_en": "After return to service, the signed CAA Form 337 shall be submitted to CAA within 48 hours as applicable."}, {"id": 26, "question": "After complete A check or above maintenance check\non aircraft, the certifying staff to sign off Base\nMaintenance Release Certificate shall have which", "options": ["LAE B1.1", "Inspector", "LAE Cat. C"], "page": 2, "correct": [2], "confidence": "高", "note": "LAE Cat. C 是 Cat. C Licensed Aircraft Engineer，可理解為 C 類航機簽放工程師；此類授權用於 aircraft base maintenance 後簽發 Certificate of Release to Service / Base Maintenance Release。", "category": "General Maintenance", "source": "TAMECO RSQCM §12.4D", "question_zh": "完成航空器 A check 或以上等級維護檢查後，簽署 Base Maintenance Release Certificate 的簽證人員應具備何種資格？", "options_zh": [null, "檢驗員（Inspector）", "C 類航機簽放工程師（Cat. C Licensed Aircraft Engineer）"], "note_en": "LAE Cat. C means Category C Licensed Aircraft Engineer. In this context, the Cat. C authorized person signs the Base Maintenance Release / Certificate of Release to Service after A check or higher base maintenance."}, {"id": 27, "question": "After completion of items on the job card,\nauthorization personnel should", "options": ["Sign off with authorization stamp", "Sign off with signature record on file", "All of the above"], "page": 2, "correct": [2], "confidence": "高", "note": "工卡完成後可依程序以授權章或已備存簽名紀錄簽署。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures", "question_zh": "工卡項目完成後，授權人員應如何簽署？", "options_zh": ["使用授權章簽署", "使用已備存於紀錄內之簽名樣式簽署", "以上皆是"], "note_en": "After completing job card items, the authorized person may sign off using an authorization stamp or a signature recorded on file, in accordance with the approved procedure."}, {"id": 28, "question": "After maintenance scheduled checks which form\nshould be fillout as an evidence of airworthy for safe\nflight and can be checked by CAA?", "options": ["FAA Form 337", "Certificate of release to service after maintenance", "CAA FAA Form 337"], "page": 2, "correct": [1], "confidence": "高", "note": "定期維護後作為適航/可安全飛航證明者為維護後恢復可用簽證/CRS。", "category": "FAA/FAR", "source": "14 CFR / FAR / FAA guidance; TAMECO FAA RSQCM, where applicable", "question_zh": "定期維護檢查後，應填寫何種表格作為航空器適航且可安全飛航，並可供 CAA 查核之證明？", "options_zh": [null, "維護後恢復可用證明", null], "note_en": "The certificate of release to service after maintenance is the evidence that the aircraft is airworthy for safe flight."}, {"id": 29, "question": "Aircraft daily schedule maintenance includes", "options": ["pre-flight check", "transit check", "all of the above"], "page": 2, "correct": [2], "confidence": "高", "note": "日常維護包含 pre-flight check 與 transit check。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures", "question_zh": "航空器日常排定維護包含哪些項目？", "options_zh": ["飛行前檢查", "過站檢查", "以上皆是"], "note_en": "Daily scheduled maintenance includes pre-flight checks and transit checks."}, {"id": 30, "question": "Aircraft maintenance check shall be recorded in?", "options": ["in aircraft log book", "in engine log book", "Both of the above"], "page": 2, "correct": [2], "confidence": "中", "note": "維護紀錄可涉及航空器及發動機紀錄；題目用語較廣，以 Both of the above 判定。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures", "question_zh": "航空器維護檢查應記錄於何處？", "options_zh": ["航空器飛航／維護紀錄簿", "發動機紀錄簿", "以上皆是"], "note_en": "Maintenance checks may be recorded in the aircraft log book and/or engine log book, as applicable."}, {"id": 31, "question": "Aircraft operator can consign CAA approved\nindividual, group or repair station to perform\nmaintenance on aircraft, and who is responsible for", "options": ["aircraft operator", "the individual, group or repair station who have the\nconsignment from aircraft operator", "Both of the above"], "page": 2, "correct": [0], "confidence": "高", "note": "即使委託經核准個人、團體或維修廠執行維修，航空器所有人/使用人仍對航空器持續適航與適航安全條件負責。", "category": "CAA/CAR", "source": "CAR 06-01A Art. 19; Art. 21-23", "question_zh": "航空器使用人可委託 CAA 核准之個人、團體或維修廠執行航空器維護，責任由誰負責？", "options_zh": ["航空器使用人", "受航空器使用人委託之個人、團體或維修廠", "以上皆是"], "note_en": "Even when maintenance is contracted out, the aircraft owner/operator remains responsible for continuing airworthiness, and the contracted party is responsible for the work performed."}, {"id": 32, "question": "Because of special circumstance when approved by\nthe CAA, the weighing schedule may be extended\nbut in no", "options": ["three years", "four years", "five years"], "page": 2, "correct": [1], "confidence": "高", "note": "06-01A 第 20 條：航空器每 3 年稱重一次；特殊情形經 CAA 核准可延展，延展最長 1 年，因此總週期最多 4 年。", "category": "General Maintenance", "source": "CAR 06-01A Art. 20", "question_zh": "因特殊情況經 CAA 核准時，稱重週期可延長，但最長不得超過幾年？", "options_zh": ["三年", "四年", "五年"], "note_en": "The normal weighing interval is 3 years. With CAA approval for special circumstances, it may be extended up to a total of 4 years."}, {"id": 33, "question": "CAA Form 337放置處，下列何者為誤", "options": ["併同工作記錄歸檔", "隨附於 Technical Information\nFolder(TI Folder)", "工作單位自存。"], "page": 2, "correct": [2], "confidence": "高", "note": "CAA Form 337 不應僅由工作單位自存。", "category": "FAA/FAR", "source": "14 CFR / FAR / FAA guidance; TAMECO FAA RSQCM, where applicable", "options_zh": [null, null, null]}, {"id": 34, "question": "Can over due precision measuring equipment be\nborrowed for temporary use?", "options": ["Over due precision measuring equipment of all units\nshall not be allowed use.", "Over due precision measuring equipment of all units\ncan be used for emergency case under the approval\nof shop manager.", "Over due precision measuring equipment of all units\ncan be used for emergency case under the approval\nof QA Department."], "page": 2, "correct": [0], "confidence": "高", "note": "逾期校驗之 PME 不得借用或使用；應送校驗/重新確認有效後方可使用。", "category": "General Maintenance", "source": "TAMECO RSQCM §15.3 Precision Measurement Equipment Control", "question_zh": "逾期校驗之精密量測設備是否可臨時借用？", "options_zh": ["各單位逾期校驗之精密量測設備不得使用。", "各單位逾期校驗之精密量測設備於緊急狀況下，經 shop manager 核准後可以使用。", "各單位逾期校驗之精密量測設備於緊急狀況下，經 QA Department 核准後可以使用。"], "note_en": "Overdue precision measuring equipment shall not be borrowed or used until its calibration status is restored."}, {"id": 35, "question": "Final Inspection 應應確認那些項目?", "options": ["All work has been inspected as required for\ncompliance with inspection system.", "Not any known condition exists that would make\nThe aircraft unairworthy.\n-So far as The work performed is concerned, The\naircraft is in condition for safe operation.\n-A required inspection was satisfactorily completed.", "以上皆是"], "page": 3, "correct": [2], "confidence": "高", "note": "Final Inspection 應確認必要檢驗、適航狀況與 required inspection 完成情形。", "category": "FAA/FAR", "source": "14 CFR / FAR / FAA guidance; TAMECO FAA RSQCM, where applicable", "options_zh": ["所有工作均已依檢驗系統要求完成檢驗。", "不存在任何已知會造成航空器不適航之狀況；就已完成之工作而言，航空器處於可安全操作狀態；必要檢驗已滿意完成。", null], "note_en": "Final inspection confirms required inspections, airworthiness condition, and satisfactory completion of required inspections."}, {"id": 36, "question": "For following items, which one is not B1 certify staff\nprivilege?", "options": ["certify maintenance tasks of airframes and their\nrelated systems.", "Avonics LRU replacement tasks", "Electrical power generation and distribution system\ntasks"], "page": 3, "correct": [1], "confidence": "高", "note": "B1 可簽放機體、powerplant、mechanical/electrical systems，並可對需簡單測試的 avionics work 簽放；但 Avionics LRU replacement 一般屬 B2/航電權限。", "category": "General Maintenance", "source": "TAMECO RSQCM §12.4D", "question_zh": "下列哪一項不是 B1 簽證人員權限？", "options_zh": ["簽證機體及其相關系統之維護工作。", "航電 LRU 更換工作。", "發電與配電系統工作。"], "note_en": "B1 privilege generally covers airframe, powerplant, mechanical and electrical systems, while avionics LRU replacement is normally a B2/avionics privilege."}, {"id": 37, "question": "For US-register aircraft, which of following\nOperation Specification should be applied by\nTAMECO?", "options": ["EASA Part 145 Approval", "FAR-145 Approval", "HKAR-145 Approval"], "page": 3, "correct": [1], "confidence": "高", "note": "美國註冊機適用 FAR-145 approval。", "category": "EASA Part-145", "source": "EASA Part-145 / TAMECO MOE / relevant authority approval, where tions_zh": ["一年", "兩年", "三年"], "note_en": "Aircraft basic weight and balance must normally be weighed once every 3 years."}, {"id": 41, "question": "In accordance 06-02A,repair station shall retain the\nmaintenance records for how long?", "options": ["one year at least", "retain the records forever or until after two years of\nthe aircraft/engine/component scrapped", "two years at least"], "page": 3, "correct": [2], "confidence": "高", "note": "06-02A 第 31 條規定維修紀錄及簽放文件自核准恢復可用日起至少保存 2 年。", "category": "CAA/CAR", "source": "CAR 06-02A Art. 31", "question_zh": "依 06-02A，維修廠應保存維修紀錄多久？", "options_zh": ["至少一年", "永久保存，或保存至航空器／發動機／部件報廢後兩年", "至少兩年"], "note_en": "CAR 06-02A requires maintenance records to be retained for at least two years after approval for return to service."}, {"id": 42, "question": "In accordance with RSM Chapter 9, when\nTAMECO sub-contract component maintenance\nfunction to non-certified repair station, the certificate\nof release to service of the entire componenet should", "options": ["Certifying staff of non-certified repair station", "Certifying staff of TAMECO", "All of above"], "page": 3, "correct": [1], "confidence": "高", "note": "TAMECO 委外給未取得認證之支援廠商時，維修廠仍須確認工作完成且適航；整體部件 CRS/恢復可用應由 TAMECO 授權簽證人員負責。", "category": "General Maintenance", "source": "CAR 06-02A Art. 21 / Art. 31-33; TAMECO RSQCM §9.4", "question_zh": "依 RSM Chapter 9，當 TAMECO 將部件維修功能委外給未認證維修廠時，整個部件的恢復可用證明應由誰簽發？", "options_zh": ["未認證維修廠之簽證人員", "TAMECO 簽證人員", "以上皆是"], "note_en": "When work is subcontracted to a non-certificated repair station, TAMECO remains responsible for the final component release to service."}, {"id": 43, "question": "In R.O.C. Taiwan CAA regulation, for the airman\npenalty(fine) shall refer CAR 01-01A which article?\nAnd fine by?", "options": ["Article 111, fine from NTD 300K to 3000K.", "Article 111, fine from NTD 60K to 300K.", "Article 112, fine form 600K to 3000K"], "page": 3, "correct": [1], "confidence": "高", "note": "01-01A 第 111 條航空人員罰則為新臺幣六萬元以上三十萬元以下罰鍰或停止 CC or authorization control function per company procedure."}, {"id": 47, "question": "The triangle stamp will be issued for?", "options": ["AE", "LAE", "AME"], "page": 3, "correct": [1], "confidence": "高", "note": "RSQCM §12.5F 的授權章樣式顯示：三角章為 Stamp for LAE/Inspector；AME 與 Assistant Engineer 為橢圓章。", "category": "General Maintenance", "source": "TAMECO RSQCM §12.5F", "question_zh": "三角章會核發給誰？", "options_zh": [null, null, null], "note_en": "The triangle stamp is for LAE/Inspector. AME and Assistant Engineer use oval stamps."}, {"id": 48, "question": "What documents and data must be current and\naccessible when the relevant work is being done?", "options": ["Airworthiness directives, Instructions for continued\nairworthiness, &Maintenance manuals,", "Overhaul manuals, Standard practice manuals, &\nService bulletins", "All of the above"], "page": 3, "correct": [2], "confidence": "高", "note": "AD、ICA、AMM、OHM、SPM、SB 等相關文件在作業時均須為最新版且可取得。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures", "question_zh": "執行相關工作時，哪些文件與資料必須是現行有效且可取得的？", "options_zh": ["適航指令、持續適航文件及維護手冊。", "翻修手冊、標準施工手冊及服務通報。", "以上皆是"], "note_en": "ADs, ICA, maintenance manuals, overhaul manuals, standard practice manuals, and service bulletins must be current and accessible when the work is performed."}, {"id": 49, "question": "What is the purpose of AD(Airworthiness Directive)\n?", "options": ["To notify an unsafe condition of aircraft/ Engine/\ncomponent.", "To ehhence reliability of aircraft/ Engine/\ncomponent.", "To extend time limit of aircraft/ Engine/ component."], "page": 3, "correct": [0], "confidence": "高", "note": "AD 用於通知並矯正航空器/發動機/零組件不安全狀況。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures", "question_zh": "AD（適航指令）的目的為何？", "options_zh": ["通知航空器／發動機／部件之不安全狀況。", "提升航空器／發動機／部件之可靠度。", "延長航空器／發動機／部件之時限。"], "note_en": "An AD notifies and mandates correction of unsafe conditions on an aircraft, engine, or component."}, {"id": 50, "question": "What should be done if authorization stamp is lost?", "options": ["Report to leader and inform EPD to make another\nstamp", "Report to department General Manager and inform\nHRD to make another stamp", "Report to QAD to make another stamp"], "page": 3, "correct": [2], "confidence": "高", "note": "授權章遺失或損壞時，持有人應向 QAD 報告；QAD 負責補發與管制。", "category": "SDR/飛安通報", "source": "TAMECO RSQCM §12.5D", "question_zh": "授權章遺失時應如何處理？", "options_zh": ["回報領班並通知 EPD 製作另一個章。", "回報部門總經理並通知 HRD 製作另一個章。", "回報 QAD 製作另一個章。"], "note_en": "If an authorization stamp is lost, the holder shall report to QAD for control and replacement."}, {"id": 51, "question": "When doing maintenance on China Airlines aircraft,\nwhich quality manual can not be the reference\ndocument?", "options": ["China Airlines GMM", "China Airlines RSM/QCM", "TAMECO RSQCM"], "page": 3, "correct": [2], "confidence": "高", "note": "維修華航航機時，不能以 TAMECO RSQCM 取代華航適用品質/維護手冊作為顧客放行依據。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures", "question_zh": "維修中華航空航空器時，哪一本品質手冊不能作為參考文件？", "options_zh": [null, null, null], "note_en": "When maintaining China Airlines aircraft, TAMECO RSQCM cannot replace the customer’s applicable quality/maintenance manual."}, {"id": 52, "question": "When make a entry to maintenance log or task card,\nyou shall not use?", "options": ["Pencil", "black ball pen", "dark blue ink pen"], "page": 4, "correct": [0], "confidence": "高", "note": "維護紀錄/工卡不得使用鉛筆填寫。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures", "question_zh": "填寫維護紀錄或工卡時，不得使用什麼？", "options_zh": ["鉛筆", "黑色原子筆", "深藍色墨水筆"], "note_en": "Do not use pencil for maintenance log or task card entries."}, {"id": 53, "question": "When performing AD task cards, if discover the\ninspection area has already performed\nrepair/alteration, and cause current status of\ninspection area is different from description in task", "options": ["Put N/A on non applicable work steps, and state the\nreasons,", "AMOC (Alternate Method of Compliance) should be\napplied to CAA/FAA", "Complete certifying the inspection area in the task\ncard, and report to manager or engineer."], "page": 4, "correct": [1], "confidence": "高", "note": "AD 檢查區已修理/改裝且與工卡描述不一致，應申請 AMOC 或取得主管機關核准替代符合方法。", "category": "FAA/FAR", "source": "14 CFR / FAR / FAA guidance; TAMECO FAA RSQCM, where applicable", "question_zh": "執行 AD 工卡時，若發現檢查區域已執行過修理／改裝，導致現況與工卡描述不同，應如何處理？", "options_zh": ["在不適用的工作步驟填 N/A，並說明原因。", "應向 CAA/FAA 申請 AMOC（替代符合方法）。", "完成該檢查區域的簽證，並回報主管或工程師。"], "note_en": "If the inspection area differs from the AD task card because of previous repair/alteration, an AMOC or authority-approved alternative method should be obtained."}, {"id": 54, "question": "When performing maintenance for customer aircraft,\nwhich manual should be followed for the RII items\nand how to sign off maintenance log?", "options": ["CAL’s GMM", "Customer manual", "Repair Station Manual"], "page": 4, "correct": [1], "confidence": "高", "note": "執行顧客機維修時，RII items 與維修紀錄簽署應依 Customer manual / Customer GMM，而非 TAMECO 自己決定。", "category": "RII", "source": "TAMECO RSQCM §8.2D; TPM §7.8G", "question_zh": "執行顧客航空器維修時，RII 項目與維護紀錄簽署應依哪一本手冊？", "options_zh": [null, "顧客手冊", "維修廠手冊"], "note_en": "RII items and log sign-off for customer aircraft shall follow the customer manual/customer GMM."}, {"id": 55, "question": "Where you can find CAA regulation ?", "options": ["Hard Copy in QAD and AMD office", "www.caa.gov.tw\non web site: www.caa.gov.tw", "Both of the above"], "page": 4, "correct": [2], "confidence": "高", "note": "CAA 法規可於 QAD/AMD 紙本及 CAA 網站查得。", "category": "CAA/CAR", "source": "CAR 06-01A / 06-02A and applicable CAA rules", "question_zh": "你可以在哪裡找到 CAA 法規？", "options_zh": ["QAD 與 AMD 辦公室的紙本。", "CAA 網站：www.caa.gov.tw", "以上皆是"], "note_en": "CAA regulations are available in QAD/AMD hard copies and on the CAA website."}, {"id": 56, "question": "Which article in 01-01A is violated for \"Not\nreporting or intentionally not reporting an incident\nrelating to flight safety\" ?", "options": ["article 110", "article 111", "article 112"], "page": 4, "correct": [1], "confidence": "高", "note": "未通報或故意隱匿飛安相關事件對航空人員屬 01-01A 第 111 條範圍。", "category": "01-01A 民用航空法", "source": "01-01A 民用航空法", "question_zh": "「未通報或故意不通報飛安相關事件」違反 01-01A 哪一條？", "options_zh": ["第 110 條", "第 111 條", "第 112 條"], "note_en": "For airmen, failure to report or intentional concealment of a flight-safety-related occurrence falls under 01-01A Article 111."}, {"id": 57, "question": "Which authorization category can perform swing\noperations for compass systems on the aircraft?", "options": ["Authorization Category M2", "Authorization Category B2", "Authorization Category B2 with compass swing\nauthorization."], "page": 4, "correct": [2], "confidence": "高", "note": "Compass swing 必須具備 B2 授權並加註 compass swing authorization。", "category": "General Maintenance", "source": "TAMECO TPM §7.8I Compass Swing / company authorization", "question_zh": "哪一類授權可以在航空器上執行羅盤系統校正／compass swing 作業？", "options_zh": ["M2 授權類別", "B2 授權類別", "B2 授權類別且具 compass swing 授權"], "note_en": "Compass swing requires B2 authorization with specific compass swing authorization."}, {"id": 58, "question": "Which authorization category staff can buy back the\nRII item?", "options": ["person with AME Category", "person with RII Authorization", "person with B1.1/B2 License"], "page": 4, "correct": [1], "confidence": "高", "note": "RII item 的買回/完工檢驗須由具 RII Authorization 的人員執行。", "category": "RII", "source": "TAMECO RSQCM §8.2D; §12.4E", "question_zh": "哪一類授權人員可以買回／完工檢驗 RII 項目？", "options_zh": ["具 AME 類別人員", "具 RII 授權人員", "具 B1.1/B2 執照人員"], "note_en": "RII buy-back/final inspection must be performed by personnel with RII authorization."}, {"id": 59, "question": "Which category authorization can issue Maintenance\nRelease Certificate ?", "options": ["Category B1/B2", "Category B1/B2 and C", "Category S3"], "page": 4, "correct": [1], "confidence": "高", "note": "B1/B2 可依各自範圍簽放 maintenance release；Category C 可簽放 base maintenance 後整機 release。", "category": "General Maintenance", "source": "TAMECO RSQCM §12.4D", "question_zh": "哪一類授權可以簽發 Maintenance Release Certificate？", "options_zh": [null, "Category B1/B2 及 C", null], "note_en": "B1/B2 may issue maintenance release within their privileges; Category C may issue whole aircraft base maintenance release."}, {"id": 60, "question": "Which data is CAA acceptable data?", "options": ["CAA AD", "manufacturer or vendor SB", "SRM"], "page": 4, "correct": [1], "confidence": "高", "note": "RSQCM §17.4E 將 manufacturers’ maintenance manuals, service bulletins and letters 列為 CAA acceptable data；SRM、STC、AD 等則可屬 approved data。", "category": "CAA/CAR", "source": "TAMECO RSQCM §17.4E", "question_zh": "下列哪一項是 CAA 可接受資料？", "options_zh": [null, "製造廠或供應商 SB", null], "note_en": "Manufacturer/vendor service bulletins are generally CAA acceptable data; SRM, AD, or CAA-approved data may be approved data depending on context."}, {"id": 61, "question": "Which data is not CAA approved data?", "options": ["the maintenance data through FSMIS to get approval\nfrom CAA", "manufacturer or vendor SB", "CAA AD"], "page": 4, "correct": [1], "confidence": "高", "note": "manufacturer/vendor SB 通常屬 CAA acceptable data，不一定是 CAA approved data；CAA AD 及經 FSMIS/CAA 核准之資料屬 approved data。", "category": "CAA/CAR", "source": "TAMECO RSQCM §17.4E", "question_zh": "下列哪一項不是 CAA 核准資料？", "options_zh": ["透過 FSMIS 取得 CAA 核准之維修資料", "製造廠或供應商 SB", null], "note_en": "Manufacturer/vendor SB is generally acceptable data, not necessarily CAA approved data."}, {"id": 62, "question": "Which form of the following shall be issued after\ncompleted Major Alteration/Modification on \"B\"\nregistered aircraft?", "options": ["Aircraft Maintenance Release\nCertificate", "Certificate of major alteration and Release to Service", "CAA Form 337"], "page": 4, "correct": [2], "confidence": "高", "note": "B-registered aircraft 完成大改裝/大修理應使用 CAA Form 337。", "category": "FAA/FAR", "source": "14 CFR / FAR / FAA guidance; TAMECO FAA RSQCM, where applicable", "question_zh": "B 註冊航空器完成大改裝／改裝後，應簽發下列何種表格？", "options_zh": ["航空器維護恢復可用證明", "大改裝與恢復可用證明", null], "note_en": "After a major alteration/modification on a B-registered aircraft, CAA Form 337 shall be issued."}, {"id": 63, "question": "Which manual complies with EASA Part 145\nregulation in current TAMECO's Manuals?", "options": ["RSM (Repair Station Manual)", "GMM", "M. O. E. (Maintenance Organization Exposition) for\nEASA"], "page": 4, "correct": [2], "confidence": "高", "note": "符合 EASA Part-145 的維修組織手冊為 MOE。", "category": "EASA Part-145", "source": "EASA Part-145 / TAMECO MOE / relevant authority approval, where applicable", "question_zh": "TAMECO 現行手冊中，哪一本手冊符合 EASA Part 145 規定？", "options_zh": [null, null, "EASA 用 MOE（Maintenance Organization Exposition）"], "note_en": "For EASA Part-145, the applicable manual is the MOE."}, {"id": 64, "question": "Which of following is Approved data", "options": ["AMM", "SRM", "IPC"], "page": 4, "correct": [1], "confidence": "高", "note": "RSQCM §17.4E 將 Structure Repair Manual (SRM) 列於 CAA approved data；AMM/SB 多屬 acceptable data，IPC 不是修理核准資料。", "category": "General Maintenance", "source": "TAMECO RSQCM §17.4E", "question_zh": "下列哪一項是核准資料？", "options_zh": [null, null, null], "note_en": "SRM is treated as approved data for structural repair. AMM/SB are usually acceptable data, and IPC is not repair approval data."}, {"id": 65, "question": "Which of following is major alteration?", "options": ["an alteration that might appreciably affect\nperformance", "an alteration that might appreciably affect weight\nand balance", "all of the above"], "page": 4, "correct": [2], "confidence": "高", "note": "大改裝包含明顯影響性能、重量平衡、結構強度、飛行特性或其他適航品質等情況。", "category": "General Maintenance", "source": "CAR 06-01A Art. 2; TAMECO RSQCM §17.4D", "question_zh": "下列哪一項屬於大改裝？", "options_zh": ["可能明顯影響性能之改裝", "可能明顯影響重量與平衡之改裝", "以上皆是"], "note_en": "Major alteration includes changes that may appreciably affect performance, weight and balance, structural strength, flight characteristics, or airworthiness qualities."}, {"id": 66, "question": "Which of following is major repair?", "options": ["a repair that if improperly done, might appreciably\naffect performance", "a repair that if improperly done, might appreciably\naffect weight and balance", "all of the above"], "page": 4, "correct": [2], "confidence": "高", "note": "大修理包含若施工不當可能明顯影響性能、重量平衡、結構強度、飛行特性或其他適航品質等情況。", "category": "General Maintenance", "source": "CAR 06-01A Art. 2; TAMECO RSQCM §17.4D", "question_zh": "下列哪一項屬於大修理？", "options_zh": ["若施工不當，可能明顯影響性能之修理", "若施工不當，可能明顯影響重量與平衡之修理", "以上皆是"], "note_en": "Major repair includes repairs that, if improperly done, may appreciably affect performance, weight and balance, structural strength, flight characteristics, or airworthiness qualities."}, {"id": 67, "question": "Which of following is not Airworthiness Release\nCertificate?", "options": ["EASA Form One", "FAA Form 8110-3", "FAA Form 8130-3"], "page": 4, "correct": [1], "confidence": "高", "note": "FAA Form 8110-3 是工程核准/適航資料核准文件，不是 Airworthiness Release Certificate。", "category": "EASA Part-145", "source": "EASA Part-145 / TAMECO MOE / relevant authority approval, where applicable", "question_zh": "下列哪一項不是適航放行證明？", "options_zh": [null, null, null], "note_en": "FAA Form 8110-3 is an engineering approval/data approval document, not an airworthiness release certificate."}, {"id": 68, "question": "Which of following is NOT issued by aiviation\nauthority?", "options": ["SB(Service Bulletin)", "AD(Airworthiness Directives)", "AC(Advisory Circular)"], "page": 4, "correct": [0], "confidence": "高", "note": "Service Bulletin 由製造廠發布，非航空主管機關發布。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures", "question_zh": "下列哪一項不是由航空主管機關發布？", "options_zh": ["SB（服務通報）", "AD（適航指令）", "AC（諮詢通告）"], "note_en": "Service Bulletins are issued by the manufacturer, not by the aviation authority."}, {"id": 69, "question": "Which of the following is airworthiness release\ncertificate of\nR.O.C ?", "options": ["CAA Form 8130-3", "CAA Form One", "CAA Form 337"], "page": 5, "correct": [1], "confidence": "高", "note": "R.O.C. airworthiness release certificate 為 CAA Form One。", "category": "FAA/FAR", "source": "14 CFR / FAR / FAA guidance; TAMECO FAA RSQCM, where applicable", "question_zh": "下列哪一項是中華民國的適航放行證明？", "options_zh": [null, null, null], "note_en": "The R.O.C. airworthiness release certificate is CAA Form One."}, {"id": 70, "question": "while maintenance on B-registered aircraft, who can\napprove the major repair ?", "options": ["Direct supervisor", "CAA of R.O.C", "aircraft manufacturer"], "page": 5, "correct": [1], "confidence": "高", "note": "B-registered aircraft 的 major repair 需使用 CAA approved data，因此由 R.O.C. CAA 核准。", "category": "CAA/CAR", "source": "CAR 06-01A Art. 21; TAMECO RSQCM §17.4C-E", "question_zh": "維修 B 註冊航空器時，誰可以核准大修理？", "options_zh": ["直屬主管", "中華民國 CAA", "航空器製造廠"], "note_en": "For B-registered aircraft, major repair data must be approved by the R.O.C. CAA."}, {"id": 71, "question": "Who is an authorized personnel to release “A330”\nregistered aircraft return to service after A check and\nthe", "options": ["B1.1 Authorization Category with A330\nauthorization", "B2 Authorization Category with A330 authorization", "Authorization Category C with A330 type\nauthorization"], "page": 5, "correct": [2], "confidence": "高", "note": "A check 或以上 base maintenance 後，恢復可用簽放由具該型別授權之 Category C / Cat. C LAE 執行。", "category": "General Maintenance", "source": "TAMECO RSQCM §12.4D", "question_zh": "完成 A330 註冊航空器 A check 或以上維護後，誰是授權恢復可用簽放人員？", "options_zh": ["具 A330 授權之 B1.1 授權類別", "具 A330 授權之 B2 授權類別", "具 A330 型別授權之 C 類航機簽放工程師（Cat. C LAE）"], "note_en": "After an A check or higher base maintenance check, the release to service is signed by a Category C / Cat. C LAE with the applicable aircraft type authorization."}, {"id": 72, "question": "Who is responsible to maintain his/her authorization\nin validity ?", "options": ["authorization holder", "Department manager", "Company"], "page": 5, "correct": [0], "confidence": "高", "note": "授權證有效性由授權持有人本人負責維持。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures", "question_zh": "誰負責維持自己授權的有效性？", "options_zh": ["授權持有人", "部門經理", "公司"], "note_en": "The authorization holder is responsible for maintaining his/her authorization validity."}, {"id": 73, "question": "以下何者不屬於強制性報告之飛安相關事件?", "options": ["維護或測試時期之任何緊急逃生系統或裝備失效", "以上皆不屬於強制性報告之飛安相關事件", "因地面作業不當或裝備失效，導致航空器受損須\n停機檢修者。"], "page": 5, "correct": [0], "confidence": "中", "note": "維護/測試期間緊急逃生系統失效是否強制通報取決於 08-01A 細項；此題暫判選項 1，建議複核 08-01A。", "category": "SDR/飛安通報", "source": "TAMECO RSQCM §16.5 / §16.7; CAR 06-01A Art. 27; CAR 06-02A Art. 32; 08-01A as applicable"}, {"id": 74, "question": "每一項維護完工簽證前必須--", "options": ["確認工作已妥善執行並正確的記錄", "使用之工具及測試裝備均於校驗期限內", "以上皆是"], "page": 5, "correct": [2], "confidence": "高", "note": "每項維護完工簽證前，需確認工作已妥善執行、正確記錄，且工具/測試設備在有效校驗期限內。", "category": "General Maintenance", "source": "CAR 06-01A Art. 6, Art. 10; TAMECO RSQCM §11.2 / §15.3"}, {"id": 75, "question": "每項維護簽證紀錄內容應包含--", "options": ["執行維護工作之依據及重點摘要", "維護完工日期及簽證人員之簽署", "以上皆是"], "page": 5, "correct": [2], "confidence": "高", "note": "維護簽證紀錄應包含執行工作依據與摘要、完工日期、執行人員及授權簽證人員簽署/證照資訊。", "category": "General Maintenance", "source": "CAR 06-01A Art. 6"}, {"id": 76, "question": "依據06-01A第6條規定，航空器恢復可用時，應\n於維護紀錄記載哪些內容?", "options": ["所從事工作及其依據技術資料之說明", "工作完成且確認符合技術資料時，授權簽證人員\n姓名之簽署與檢定證類別及號碼之記載", "以上皆是"], "page": 5, "correct": [2], "confidence": "高", "note": "06-01A 第 6 條要求記載工作與依據技術資料之說明、完工日期、執行人員姓名、授權簽證人員簽署與檢定證類別/號碼。", "category": "CAA/CAR", "source": "CAR 06-01A Art. 6"}, {"id": 77, "question": "為維持授權證的有效性授權人員多久需進行一次\n複核(renewal) 作業", "options": ["18個月", "24個月", "30個月"], "page": 5, "correct": [1], "confidence": "高", "note": "授權/相關訓練維持通常以 24 個月作為 recurrent / renewal 週期。", "category": "General Maintenance", "source": "TAMECO RSQCM §12.6; TPM recurrent training requirements"}, {"id": 78, "question": "航空器適航安全條件應是由誰來負責保持", "options": ["依照民航局核准維護計畫執行維護工作的維修廠", "訂定維護計畫的航空器所有人或使用人", "核發維修廠證照和核准維護計畫的民航局"], "page": 5, "correct": [1], "confidence": "高", "note": "保持航空器適航安全條件的責任屬航空器所有人或使用人。", "category": "CAA/CAR", "source": "CAR 06-01A Art. 19"}, {"id": 79, "question": "授權章遺失時如何完成工單簽署", "options": ["隨意簽名只要可辨識姓名就好", "簽名需與領授權章時簽名樣式相同並加上員工\n號與日期", "請有授權章的同事協助蓋章簽證"], "page": 5, "correct": [1], "confidence": "高", "note": "授權章遺失時，簽名須與備存樣式一致並註明員工號及日期。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures"}, {"id": 80, "question": "授權證到期日前未提出複核申請，於授權證屆期\n後會發生什麼事？", "options": ["撤銷授權", "暫停授權", "以上皆非"], "page": 5, "correct": [0], "confidence": "高", "note": "RSQCM §12.6D 規定未於到期月份結束前完成 recurrent training / renewal 要求者，授權功能於次月第一日 revoked。", "category": "General Maintenance", "source": "TAMECO RSQCM §12.6D"}, {"id": 81, "question": "A EASA Part-145 approved maintenance\norganisation is authorised to.", "options": ["approve major modifications.", "issue certificates for work completed in aircraft\nmaintenance or overhaul.", "originate repair schemes and manufacture parts."], "page": 5, "correct": [1], "confidence": "高", "note": "EASA Part-145 維修組織可對完成的航空器維護或大修工作簽發證明/CRS。", "category": "EASA Part-145", "source": "EASA Part-145 / TAMECO MOE / relevant authority approval, where applicable", "question_zh": "EASA Part-145 核准維修組織被授權可以執行何項工作？", "options_zh": ["核准重大改裝。", "針對航空器維護或翻修完成之工作簽發證明。", "自行設計修理方案並製造零件。"], "note_en": "An EASA Part-145 approved organization may issue certificates for maintenance or overhaul work completed within its approval scope."}, {"id": 82, "question": "A EASA Part-145 organisation based outside the\nEU, the competent authority is", "options": R Part 43 規範 maintenance, preventive maintenance, rebuilding, alteration。", "category": "FAA/FAR", "source": "14 CFR / FAR / FAA guidance; TAMECO FAA RSQCM, where applicable", "question_zh": "14 CFR Part 43 規範什麼？", "options_zh": ["維護、預防性維護、重造及改裝。", "航空人員（飛航組員以外）檢定。", "運作。"], "note_en": "14 CFR Part 43 regulates maintenance, preventive maintenance, rebuilding, and alteration."}, {"id": 93, "question": "A person direct in charge", "options": ["Does not need to physically observe and direct each\nworker constantly but must be available for\nconsultation on matters requiring instruction or\ndecision from higher authority", "Need to physically observe and direct each worker\nconstantly and available for consultation on matters\nrequiring instruction or decision from higher\nauthority", "Does not need to physically observe and direct each\nworker constantly and only need to be available for\nconsultation on matters requiring instruction or\ndecision from higher authority when condition"], "page": 6, "correct": [0], "confidence": "高", "note": "Directly in charge 不必持續實體觀察每位工作者，但須可就指示/決策提供諮詢。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures", "question_zh": "直接負責人員（person directly in charge）應符合何項敘述？", "options_zh": ["不需要持續實體觀察並指揮每位工作者，但必須能就需要上級指示或決策之事項提供諮詢。", "需要持續實體觀察並指揮每位工作者，並能就需要上級指示或決策之事項提供諮詢。", "不需要持續實體觀察並指揮每位工作者，只有在有狀況時才需要能提供諮詢。"], "note_en": "A person directly in charge does not need to constantly observe each worker, but must be available for consultation and decisions."}, {"id": 94, "question": "A person working under the supervision may\nperform work", "options": ["that he is trained for", "that his supervisor is authorized to perform", "that he is told to perform"], "page": 6, "correct": [1], "confidence": "高", "note": "受監督人員可執行其主管被授權執行且其已受訓之工作。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures", "question_zh": "受監督工作的人員可以執行何種工作？ estion_zh": "依 FAR Part-145，部件維修後恢復可用應簽發何種表格？", "options_zh": [null, null, "JAA Form One／EASA Form One"], "note_en": "For component return to service under FAR Part-145, FAA Form 8130-3 is issued."}, {"id": 116, "question": "Which of the following document is not issued by\naviation authority？", "options": ["SB (Service Bulletin)", "AD (Airworthiness Directives)", "AC (Advisory Circular)"], "page": 7, "correct": [0], "confidence": "高", "note": "SB 由製造廠發布，非 aviation authority。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures", "question_zh": "下列哪一份文件不是由航空主管機關發布？", "options_zh": ["SB（服務通報）", "AD（適航指令）", "AC（諮詢通告）"], "note_en": "Service Bulletins are issued by the manufacturer, not by the aviation authority."}, {"id": 117, "question": "民用航空器在我國境內失事，是由何單位負調查\n責任？", "options": ["國家運輸安全調查委員會", "航空器所屬之航空公司", "當地司法機關"], "page": 8, "correct": [0], "confidence": "高", "note": "我國境內民用航空器失事調查責任屬國家運輸安全調查委員會。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures"}, {"id": 118, "question": "航空器適航之簽證人員，應持有有效之何種證書\n，並依航空器維護能力手冊之權限，確實執行各\n項維護及簽放作業？", "options": ["維修工程師檢定證書", "簽派員執照", "技師執照"], "page": 8, "correct": [0], "confidence": "高", "note": "航空器適航簽證人員應持有有效航空器維修工程師檢定證書，並依維護能力/授權範圍執行維護與簽放。", "category": "CAA/CAR", "source": "CAR 06-01A Appendix 1; 05-01A as applicable"}, {"id": 119, "question": "新制維修工程師執照種類分為哪幾種？", "options": ["A/B1/B2/B3/C執照", "M/S/I執照", "A/E/AV執照"], "page": 8, "correct": [0], "confidence": "高", "note": "新制維修工程師執照分類為 A/B1/B2/B3/C。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures"}, {"id": 120, "question": "航空器各項維護工作，應依據原製造廠之相關技\n術手冊、文件或由誰核准程序執行？", "options": ["維修工程師", "民航局", "維修員"], "page": 8, "correct": [1], "confidence": "高", "note": "航空器維護應依原製造廠維護手冊/持續適航文件，或其他經民航局同意/核准之方法、技術或實作執行。", "category": "CAA/CAR", "source": "CAR 06-01A Art. 10"}, {"id": 121, "question": "下列何者不是民航法定義之航空人員？", "options": ["空服員", "飛機駕駛員", "維修工程師"], "page": 8, "correct": [0], "confidence": "高", "note": "民用航空法定義之航空人員未列空服員；列有駕駛員、飛航工程師、航空器維修工程師、管制員、維修員、簽派員。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures"}, {"id": 122, "question": "民航法中航空產品指的是：", "options": ["精緻旅遊", "機票", "機體、發動機和螺旋槳"], "page": 8, "correct": [2], "confidence": "高", "note": "民用航空法所稱航空產品為航空器、航空器發動機及螺旋槳。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures"}, {"id": 123, "question": "民航法中之航空器維護紀錄，應保存至航空器或\n零組件報廢或永久停用後幾年？", "options": ["三年", "一年", "二年"], "page": 8, "correct": [2], "confidence": "高", "note": "航空器、發動機、螺旋槳經歷紀錄簿於報廢或永久停用後，至少保存 2 年。", "category": "General Maintenance", "source": "CAR 06-01A Art. 25"}, {"id": 124, "question": "民航法中日常維護工作及日常維護簽放紀錄應以\n不褪色墨汁填寫並 應保存幾年以上？", "options": ["二年", "三年", "一年"], "page": 8, "correct": [2], "confidence": "中", "note": "日常維護及簽放紀錄通常至少保存一年；建議對 06-01A 最新文字複核。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures"}, {"id": 125, "question": "因航空器使用人發現航空器、發動機、螺旋槳或\n航空器各項裝備及其零組件有系統缺失、功能失\n效、缺陷或其他事件，而可能或已經造成航空器\n無法符合持續適航標準者，應於發現後幾小時內\n依規定通報民航局，並通報航空器原製造廠。必\n要時，應通報航空器設計國民航主管機關？", "options": ["七十二小時", "二十四小時", "三十六小時"], "page": 8, "correct": [0], "confidence": "高", "note": "06-01A 第 27 條：可能或已造成航空器無法符合持續適航標準的缺失/失效/缺陷，應於發現後 72 小時內通報。", "category": "CAA/CAR", "source": "CAR 06-01A Art. 27"}, {"id": 126, "question": "於型別設計、持續適航文件或維護手冊中規範依\n年限狀態強制更換之零件稱之為：", "options": ["年限管制件", "機體", "航空產品"], "page": 8, "correct": [0], "confidence": "高", "note": "年限管制件係指於型別設計、持續適航文件或維護手冊中規範依年限狀態強制更換之零件。", "category": "CAA/CAR", "source": "CAR 06-01A Art. 2"}, {"id": 127, "question": "完成大修理或大改裝工作，應由授權簽證人員填\n具以下何種表格？", "options": ["航空器大修理、大改裝妥適報告表(337表)", "8130表", "CAA Form 1"], "page": 8, "correct": [0], "confidence": "高", "note": "完成大修理或大改裝工作，應填具航空器大修理、大改裝妥適報告表，即 337 表。", "category": "EASA Part-145", "source": "CAR 06-01A Art. 6; Appendix 3"}, {"id": 128, "question": "航空器應每幾年接受基本作業重量平衡之稱重一\n次，但因特殊情形報經民航局核准者，得酌予延\n展稱重期間，最長不超過四年？", "options": ["三年", "一年", "二年"], "page": 8, "correct": [0], "confidence": "高", "note": "航空器基本空重每 3 年稱重一次，特殊情形經 CAA 核准延展最長 1 年，因此最長不超過 4 年。", "category": "CAA/CAR", "source": "CAR 06-01A Art. 20"}, {"id": 129, "question": "航空人員檢定證自發證之日起有效期間為幾年？", "options": ["五年", "三年", "四年"], "page": 8, "correct": [0], "confidence": "中", "note": "航空人員檢定證有效期間依題庫脈絡為五年；建議對最新檢定規則複核。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures"}, {"id": 130, "question": "何種檢定證的權限是『得為航空器使用人或維修\n廠執行停機線例行維修工作與簡易缺點改正，並\n僅得對其本身所執行之工作項目辦理維護簽\n證』？", "options": ["類檢定證", "C類檢定證", "B類檢定證"], "page": 8, "correct": [0], "confidence": "高", "note": "A 類檢定證：停機線例行維修與簡易缺點改正，僅對本人執行工作簽證。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures"}, {"id": 131, "question": "何種檢定證的權限是『得於維修廠完成航空器維\n護後，執行航空器恢復可用簽證』？", "options": ["*類檢定證", "B類檢定證", "A類檢定證"], "page": 8, "correct": [0], "confidence": "高", "note": "C 類檢定證：維修廠完成航空器維護後執行恢復可用簽證。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures"}, {"id": 132, "question": "下列何者指『以航空器直接載運客、貨、郵件，\n取得報酬之事業』？", "options": ["民用航空運輸業", "普通航空業", "航空站地勤業"], "page": 8, "correct": [0], "confidence": "高", "note": "以航空器直接載運客、貨、郵件並取得報酬者為民用航空運輸業。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures"}, {"id": 133, "question": "依據06-02A第五條：維修廠申請檢定時，除應檢\n附維修廠手冊和品質管制手冊以外，還需交付哪\n一本手冊予民航局審查？", "options": ["維護能力手冊", "安全管理手冊", "訓練管理手冊"], "page": 9, "correct": [1], "confidence": "高", "note": "06-02A 第 5 條申請維修廠檢定應檢附維修廠手冊、品質管制手冊、安全管理手冊、維修能量表、組織表、訓練計畫等；本題問「哪一本手冊」，正確為安全管理手冊。", "category": "CAA/CAR", "source": "CAR 06-02A Art. 5; 06-02A Appendix 3 application form"}, {"id": 134, "question": "如果發現執行工作與原廠技術文件有所偏異的情\n況下該如何處理？", "options": ["應直接引用原廠手冊系統以外資訊", "必須依據原廠系統手冊或核可的文件", "不需獲得本公司/顧客工程單位的許可"], "page": 9, "correct": [1], "confidence": "高", "note": "若執行工作與原廠技術文件有所偏異，必須依原廠系統手冊或經核准/同意之文件處理，不得自行引用未核准資料。", "category": "General Maintenance", "source": "CAR 06-01A Art. 10; TAMECO RSQCM §17.2 / §17.4"}, {"id": 135, "question": "工作人員應正確紀錄量測數據與結果，並確認符\n合相關規範；如量測數據未符合規範的情況下該\n如何處理？", "options": ["授權人員先將航空器恢復可用，再問總工該如何\n處理", "授權人員應確認缺點已依據相關技術文件進行改\n正或管控後，才得以進行工作單簽證", "依工單要求填寫FEEDBACK單即可，後續會有\n別人處理"], "page": 9, "correct": [1], "confidence": "高", "note": "量測數據不符合規範時，授權人員應確認缺點已依相關技術文件改正或管控後，才得工作單簽證。", "category": "General Maintenance", "source": "CAR 06-01A Art. 6 / Art. 10; TAMECO RSQCM §13.7"}, {"id": 136, "question": "如因維修造成航機不適航，將違反06-01A第六條\n及第十九條規定，依據民用航空法第一百十一條\n規定，會有何種處罰？", "options": ["處新臺幣六十萬元以上三百萬元以下罰鍰或停止\n執業一個月至三個月", "處新臺幣六萬元以上三十萬元以下罰鍰或停止執\n業一個月至三個月；情節重大者，廢止其檢定證", "直接廢止其檢定證"], "page": 9, "correct": [1], "confidence": "高", "note": "因維修造成航機不適航，航空人員依民用航空法第 111 條可處新臺幣 6 萬至 30 萬罰鍰或停止執業 1 至 3 個月；情節重大者廢止檢定證。", "category": "01-01A 民用航空法", "source": "01-01A 民用航空法 Art. 111; CAR 06-01A Art. 6 / Art. 19"}, {"id": 137, "question": "民用航空法第二十三條之二第三項、民航局應派\n員檢查維修廠各項人員、設備，並督導其業務，\n受檢者應如何配合？檢查結果發現有缺失者，應\n通知其限期改善。", "options": ["不得規避、妨礙或拒絕", "規避、妨礙或拒絕", "相應不理"], "page": 9, "correct": [0], "confidence": "高", "note": "民航法第 23-2 條規定民航局得檢查維修廠各項人員、設備並督導業務，受檢者不得規避、妨礙或拒絕。", "category": "01-01A 民用航空法", "source": "01-01A 民用航空法 Art. 23-2"}, {"id": 138, "question": "民用航空法第二十五條第一項、航空人員經學、\n術科檢定合格，由民航局發給檢定證後，方得執\n行業務，並應於執業時遵守何種規定？", "options": ["隨身攜帶", "正本收於安全地方，隨身攜帶影本", "交予公司保管"], "page": 9, "correct": [0], "confidence": "高", "note": "民航法第 25 條：航空人員經檢定合格取得檢定證後方得執業，且執業時應隨身攜帶。", "category": "01-01A 民用航空法", "source": "01-01A 民用航空法 Art. 25"}, {"id": 139, "question": "民用航空法第一百零一條第一項、以強暴、脅迫\n或其他方法危害飛航安全或其設施者，其罰則為\n何？", "options": ["處七年以下有期徒刑、拘役或新臺幣九十萬元以\n下罰金", "處七年以下有期徒刑、拘役或新臺幣三十萬元以\n下罰金", "處十四年以下有期徒刑、拘役或新臺幣三十萬元\n以下罰金"], "page": 9, "correct": [0], "confidence": "高", "note": "01-01A 第 101 條第一項：危害飛航安全或其設施者，處七年以下有期徒刑、拘役或新臺幣九十萬元以下罰金。", "category": "01-01A 民用航空法", "source": "01-01A 民用航空法"}, {"id": 140, "question": "民用航空法第一百十一條第一項第二款、違反依\n第二十三條之二第二項所定規則有關維修廠手\n冊、維護紀錄、簽證或工作人員資格之規定，其\n罰則為何？", "options": ["處新臺幣六萬元以上三十萬元以下罰鍰或停止執\n業一個月至三個月", "處新臺幣六萬元以上三十萬元以下罰鍰或撤銷其\n執照", "處新臺幣九十萬元以下罰鍰"], "page": 9, "correct": [0], "confidence": "高", "note": "違反維修廠手冊、維護紀錄、簽證或工作人員資格等規定，依第 111 條航空人員罰則。", "category": "01-01A 民用航空法", "source": "01-01A 民用航空法"}, {"id": 141, "question": "08-01A第三條：航空器所有人或使用人於航空器\n發生符合強制性報告之飛安相關事件時，應於得\n知消息後二十四小時內填具甚麼資料送交通部民\n用航空局？", "options": ["保養困難報告", "飛安相關事件初報表", "妥適報告表"], "page": 9, "correct": [1], "confidence": "高", "note": "08-01A 規定符合強制性報告之飛安相關事件，應於得知後 24 小時內填具飛安相關事件初報表送民航局。", "category": "SDR/飛安通報", "source": "CAR 08-01A Art. 3 / Appendix (not in supplied PDFs)"}, {"id": 142, "question": "依據民航通告AC 120-012A，以下哪個不是保養\n困難報告通報資訊來源？", "options": ["維修廠所執行航空器定期或不定期維護、工廠拆\n檢發現", "日常維護及檢查事項", "停機線運作之飛航維護日誌或延遲改正缺點日誌"], "page": 9, "correct": [1], "confidence": "中", "note": "此題需 AC 120-012A 原文完整確認。以題庫脈絡判斷，正式 SDR 通報資訊來源包括維修廠定期/不定期維護、工廠拆檢發現，以及停機線飛航維護日誌/延遲改正缺點日誌；「日常維護及檢查事項」較不像正式列項。", "category": "General Maintenance", "source": "AC 120-012A required for final confirmation; not included in current uploads"}, {"id": 143, "question": "Airspace concepts are developed to satisfy explicit\nstrategic objectives such as", "options": ["safety, capacity, efficiency, access and the\nenvironment", "safety, comfortable, efficiency, access and the\nenvironment", "efficiency, capacity and comfortable"], "page": 9, "correct": [0], "confidence": "高", "note": "Airspace concepts 目標包含 safety, capacity, efficiency, access and environment。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures", "question_zh": "空域概念的發展，是為了滿足哪些明確的策略目標？", "options_zh": ["安全、容量、效率、進入性及環境。", "安全、舒適、效率、進入性及環境。", "效率、容量及舒適。"], "note_en": "Airspace concepts are developed to satisfy strategic objectives such as safety, capacity, efficiency, access, and the environment."}, {"id": 144, "question": "Where can you find the Customer RII items?", "options": ["GMM", "AMM", "IPC"], "page": 9, "correct": [0], "confidence": "高", "note": "Customer RII items 應查 Customer GMM。", "category": "RII", "source": "TAMECO RSQCM §8.2D; TPM §7.8G", "question_zh": "在哪裡可以找到顧客 RII 項目？", "options_zh": [null, null, null], "note_en": "Customer RII items are found in the customer GMM."}, {"id": 145, "question": "What component need a leak test after installation?", "options": ["ADIRU", "Pitot tube", "ADM"], "page": 9, "correct": [1], "confidence": "高", "note": "Pitot tube 安裝後須進行 leak test。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures", "question_zh": "哪一個部件安裝後需要做漏氣測試？", "options_zh": [null, "皮托管", null], "note_en": "A pitot tube requires a leak test after installation."}, {"id": 146, "question": "Abnormality Reporting and Handling Procedure\n\"will report such an event to the local CAA/FAA\nwithin", "options": ["72 hours", "36 hours", "24hours"], "page": 9, "correct": [2], "confidence": "高", "note": "Abnormality Reporting and Handling Procedure 通常要求事件於 24 hours 內向 local CAA/FAA 報告。", "category": "FAA/FAR", "source": "Company abnormality reporting procedure / authority reporting requirement", "question_zh": "依 Abnormality Reporting and Handling Procedure，此類事件應於多久內向當地 CAA/FAA 通報？", "options_zh": ["72 小時", "36 小時", "24 小時"], "note_en": "The abnormality reporting and handling procedure requires reporting such events to the local CAA/FAA within 24 hours."}, {"id": 147, "question": "What should you do when there is a static leak\nproblem?", "options": ["Do a leakage check", "Replace ADC", "switch ADC"], "page": 9, "correct": [0], "confidence": "高", "note": "Static leak problem 應執行 leakage check。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures", "question_zh": "當發生 static leak 問題時，應如何處理？", "options_zh": ["執行漏氣檢查。", "更  [0], "confidence": "高", "note": "航空事故主因多為 human error。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures", "question_zh": "航空事故的主要原因是什麼？", "options_zh": ["人為錯誤", "航空器", "機場設施"], "note_en": "Human error is a major cause of aviation accidents."}, {"id": 155, "question": "How many times is allowed to reset a tripped circuit\nbreaker?", "options": ["Never, until the cause has been determined", "Two times", "Once"], "page": 10, "correct": [0], "confidence": "中", "note": "CB 跳脫後，在原因未判明前不得復歸；實務上依 AMM/MEL/公司程序。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures", "question_zh": "跳脫的 circuit breaker 允許復歸幾次？", "options_zh": ["在原因判明前，不得復歸。", "兩次。", "一次。"], "note_en": "A tripped circuit breaker must not be reset until the cause has been determined, unless the applicable procedure allows it."}, {"id": 156, "question": "Which of the following is an internal contamination\nsource of an airplane?", "options": ["Hydraulic oils", "De-icing fluids", "Snow and ice"], "page": 10, "correct": [0], "confidence": "高", "note": "Hydraulic oils 為飛機內部污染來源。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures", "question_zh": "下列何者為飛機內部污染來源？", "options_zh": ["液壓油", "除冰液", "雪與冰"], "note_en": "Hydraulic oil is an internal contamination source."}, {"id": 157, "question": "Where would you find the procedures to cleaning a\nwire harness?", "options": ["WDM and SSM", "AMM and SWPM", "FIM"], "page": 10, "correct": [1], "confidence": "高", "note": "Wire harness 清潔程序查 AMM 與 SWPM。", "category": "EWIS/Standard Practices", "source": "TAMECO TPM EWIS training / OEM standard wiring practices manuals", "question_zh": "在哪裡可以找到清潔 wire harness 的程序？", "options_zh": [null, null, null], "note_en": "Wire harness cleaning procedures are found in the AMM and SWPM."}, {"id": 158, "question": "Which of the following Boeing maintenance\ndocument is used to find the wire type code and wire\npart number?", "options": ["SWPM", "AIPC", "AMM"], "page": 10, "correct": [0], "confidence": "高", "note": "Boeing wire type code / wire part number 可查 SWPM。", "category": "EWIS/Standard Practices", "source": "TAMECO TPM EWIS training / OEM standard wiring practices manuals", "question_zh": "下列哪一份 Boeing 維護文件用於查找線型代碼與導線料號？", "options_zh": [null, null, null], "note_en": "For Boeing, wire type code and wire part number are found in the SWPM."}, {"id": 159, "question": "Which of the following Airbus maintenance\ndocument is used to find the fault isolation\nprocedure?", "options": ["TSM", "ASM", "AMM"], "page": 10, "correct": [0], "confidence": "高", "note": "Airbus fault isolation procedure 查 TSM。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures", "question_zh": "下列哪一份 Airbus 維護文件用於查找故障隔離程序？", "options_zh": [null, null, null], "note_en": "For Airbus, fault isolation procedures are found in the TSM."}, {"id": 160, "question": "What is EWIS abbreviation?", "options": ["Electrical Wrap Intercomunication System", "Electrical Wiring Interconnection System", "Electrical Wiring Intercomunication System"], "page": 10, "correct": [1], "confidence": "高", "note": "EWIS = Electrical Wiring Interconnection System。", "category": "EWIS/Standard Practices", "source": "TAMECO TPM EWIS training / OEM standard wiring practices manuals", "question_zh": "EWIS 的縮寫是什麼？", "options_zh": [null, null, null], "note_en": "EWIS stands for Electrical Wiring Interconnection System."}, {"id": 161, "question": "Which inspection criteria are used for General Visual\nInspection?", "options": ["Surface cleaning", "Specialized equipment", "Normally available lighting"], "page": 10, "correct": [2], "confidence": "高", "note": "General Visual Inspection 通常使用 normally available lighting。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures", "question_zh": "General Visual Inspection 使用哪一種檢查條件？", "options_zh": ["表面清潔", "特殊設備", "一般可用照明"], "note_en": "General Visual Inspection uses normally available lighting."}, {"id": 162, "question": "If you put the airplane in the air mode with external\npower applied,you must make sure that?", "options": ["Disconnect the plugs of sensor", "Open the circuit breaker of the safety sensitive\nsystem", "Only control from cockpit"], "page": 10, "correct": [1], "confidence": "中", "note": "外電供應下將飛機置於 air mode 時，須保護/隔離 safety sensitive systems，依程序 open CB。", "category": "General Maintenance", "source": "General aviation maintenance practice / applicable company procedures", "question_zh": "在外電供應下將飛機置於 air mode 時，必須確認什麼？", "options_zh": ["拔開感測器插頭。", "打開 safety sensitive system 的 circuit breaker。", "只能由駕駛艙控制。"], "note_en": "When putting the airplane in air mode with external power applied, protect/isolate safety-sensitive systems by opening the applicable circuit breaker as required by procedure."}, {"id": 163, "question": "A hole is placed in the lowest point of electrical\ncable conduit…?", "options": ["to allow for pull through of the cables", "to secure the conduit to a piece of aircraft structure", "to allow for drainage of moisture"], "page": 10, "correct": [2], "confidence": "高", "note": "電纜導管最低點之孔用於排水/排除濕氣。", "category": "EWIS/Standard Practices", "source": "TAMECO TPM EWIS training / OEM standard wiring practices manuals", "question_zh": "在電纜導管最低點設置孔的目的為何？", "options_zh": ["供電纜拉穿。", "將導管固定於航空器結構。", "讓濕氣排出。"], "note_en": "The hole at the lowest point of the conduit allows drainage of moisture."}, {"id": 164, "question": "Where would you find the procedures to repair\nelectrical cable?", "options": ["SWPM and ESPM", "AMM", "WDM and AWM"], "page": 10, "correct": [0], "confidence": "高", "note": "Electrical cable repair procedure 查 SWPM and ESPM。", "category": "EWIS/Standard Practices", "source": "TAMECO TPM EWIS training / OEM standard wiring practices manuals", "question_zh": "在哪裡可以找到修理 electrical cable 的程序？", "options_zh": [null, null, null], "note_en": "Electrical cable repair procedures are found in SWPM and ESPM."}, {"id": 165, "question": "Which of following description about crimping tool\nis correct?", "options": ["Tools should have the certification acceptance\nrecorded on the Tool Record Card or Tool Label", "While in use, tools may be placed on wire harness or\nany of the components", "Tools dropped or hit with other objects no need to be\nrecertified in accordance with applicable directives"], "page": 10, "correct": [0], "confidence": "高", "note": "Crimping tool 應有校驗/認可狀態記錄於 Tool Record Card 或 Tool Label。", "category": "EWIS/Standard Practices", "source": "TAMECO TPM EWIS training / OEM standard wiring practices manuals", "question_zh": "下列關於壓接工具（crimping tool）的敘述何者正確？", "options_zh": ["工具應在 Tool Record Card 或 Tool Label 上記錄校驗／認可狀態。", "使用中工具可放在 wire harness 或任何部件上。", "工具掉落或撞擊其他物品後，無須依適用指令重新認證。"], "note_en": "Crimping tools must have their certification/acceptance status recorded on the Tool Record Card or Tool Label."}, {"id": 166, "question": "Please choose the best one from the following\nanswers.", "options": ["The primary benefit of applying MEL is fuel saving.", "Troubleshooting is no more required when you\ndecide to apply MEL procedures.", "The purpose of MEL is to assure that an aircraft,\nwith certain defective units or systems, arrives at its\ndestination safely and on time."], "page": 10, "correct": [2], "confidence": "高", "note": "MEL 目的在確保帶有特定故障之航空器仍可安全並準時抵達目的地。", "category": "Fuel/CDCCL", "source": "TAMECO TPM Fuel Tank Safety / CDCCL training; applicable fuel safety procedures", "question_zh": "請從下列答案中選出最佳敘述。", "options_zh": [null, "決定使用 MEL 程序後，就不再需要 troubleshooting。", "MEL 的目的在確保帶有特定故障單元或系統的航空器，能安全且準時抵達目的地。"], "note_en": "The purpose of the MEL is to allow an aircraft with certain defective units or systems to continue safely and on time under specified conditions."}, {"id": 167
